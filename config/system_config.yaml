llm:
  provider: "anthropic"       # anthropic | openai | ollama
  model: "claude-opus-4-5"       # 기존 default 유지
  model_roles:
    decision: "claude-opus-4-5"          # 의사결정: heavy model
    analyst: "claude-haiku-4-5-20251001" # 분석/요약: light model
  temperature: 0.2
  max_tokens: 4096

thresholds:
  risk_alert: 0.75
  reliability_floor: 0.35
  calibration_shrinkage: 0.3
  retrieval_floor: 0.4
  execution_feasibility_floor: 0.5
  agent_confidence_floor: 0.45

cadence:
  weekly_cycle_day: "friday"
  daily_start_time: "09:00"
  timezone: "America/New_York"

data:
  polygon_api_key: "rDrRIWoHnZPSjaNoYmeUfJRWMuDd_Ntk"
  default_ticker: "SPY"
